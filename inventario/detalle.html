<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle | RAB Automotora</title>
  <link rel="stylesheet" href="../assets/css/rab.css?v=20260714000510">
  <link rel="icon" href="../assets/images/logo.png">
  <style>
    .detail-topbar { max-width: 1140px; margin: 0 auto; padding: 1rem 1.5rem .25rem; }
    .detail-wrap { max-width: 1140px; margin: 0 auto; padding: .5rem 1.5rem 4rem; display: grid; grid-template-columns: minmax(0, 65fr) minmax(0, 35fr); gap: 2.5rem; align-items: start; }
    /* (La media query móvil está al final del bloque para ganar en la cascada.) */
    .gallery-main { position: relative; aspect-ratio: 16/10; border-radius: 16px; overflow: hidden; background: var(--bg-card); border: 1px solid var(--border); }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-photo { opacity: 0; transition: opacity .25s ease; }
    .gallery-photo.loaded { opacity: 1; }
    .gallery-loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-card); z-index: 1; }
    .gallery-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; color: #fff; transition: background .2s; border: none; cursor: pointer; }
    .gallery-nav:hover { background: rgba(0,0,0,.8); }
    .gallery-nav.prev { left: 10px; }
    .gallery-nav.next { right: 10px; }
    .gallery-counter { position: absolute; bottom: 10px; right: 12px; background: rgba(0,0,0,.6); color: rgba(255,255,255,.7); font-size: 11px; padding: 3px 10px; border-radius: 12px; }
    .gallery-thumbs-wrap { position: relative; margin-top: 10px; }
    .gallery-thumbs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.25) transparent; }
    .gallery-thumbs::-webkit-scrollbar { height: 6px; }
    .gallery-thumbs::-webkit-scrollbar-thumb { background: rgba(255,255,255,.25); border-radius: 3px; }
    /* Fade en los extremos para indicar que hay más miniaturas al hacer scroll */
    .gallery-thumbs.fade-left  { -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 26px); mask-image: linear-gradient(90deg, transparent 0, #000 26px); }
    .gallery-thumbs.fade-right { -webkit-mask-image: linear-gradient(90deg, #000 calc(100% - 26px), transparent 100%); mask-image: linear-gradient(90deg, #000 calc(100% - 26px), transparent 100%); }
    .gallery-thumbs.fade-left.fade-right { -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 26px, #000 calc(100% - 26px), transparent 100%); mask-image: linear-gradient(90deg, transparent 0, #000 26px, #000 calc(100% - 26px), transparent 100%); }
    .gallery-thumb { flex-shrink: 0; width: 64px; height: 48px; border-radius: 8px; overflow: hidden; border: 2px solid transparent; cursor: pointer; opacity: .5; transition: all .2s; }
    .gallery-thumb.active { border-color: var(--blue); opacity: 1; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .detail-info { display: flex; flex-direction: column; gap: 1.25rem; }
    .detail-price { background: rgba(20,42,68,.55); border: 1px solid rgba(62,159,203,.32); border-radius: 12px; padding: 1rem 1.25rem; }
    .detail-price-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.4); margin-bottom: 4px; }
    .detail-price-val { font-family: var(--font-data); font-variant-numeric: tabular-nums; font-weight: 600; font-size: 2.25rem; letter-spacing: -.02em; color: var(--white); }
    .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .spec-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; display: flex; align-items: flex-start; gap: .75rem; }
    .spec-card svg { color: var(--blue); flex-shrink: 0; margin-top: 2px; }
    .spec-label { font-size: 10px; color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: .1em; }
    .spec-value { font-size: 13px; font-weight: 600; color: var(--white); margin-top: 2px; }
    .detail-cta-btn { width: 100%; padding: .9rem 1rem; font-size: 14px; }

    /* ── CTA premium "Cotizar" (escritorio y móvil) ── */
    .cta-quote {
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      width: 100%; padding: .95rem 1.25rem; border-radius: 12px;
      font-family: var(--font-body); font-weight: 700; font-size: 15px; letter-spacing: .01em;
      color: #06131C; text-decoration: none; border: none; cursor: pointer;
      background: linear-gradient(180deg, var(--blue-light), var(--blue));
      box-shadow: 0 10px 26px -10px rgba(62,159,203,.65), inset 0 1px 0 rgba(255,255,255,.4);
      transition: filter .15s, transform .15s, box-shadow .15s;
    }
    .cta-quote:hover { filter: brightness(1.06); transform: translateY(-1px); box-shadow: 0 14px 32px -10px rgba(62,159,203,.8), inset 0 1px 0 rgba(255,255,255,.45); }
    .cta-quote:active { transform: translateY(0); }
    .cta-quote svg { flex-shrink: 0; }

    /* Barra de acción fija (solo móvil; se activa vía .with-mobile-bar) */
    #detail-mobile-bar { display: none; }

    /* ── Móvil / Tablet: layout pensado para teléfono ───────── */
    @media (max-width: 768px) {
      .detail-topbar { padding: .75rem .9rem .25rem; }
      .detail-wrap { display: flex; flex-direction: column; gap: 1.15rem; padding: .5rem .9rem 1.5rem; }
      .detail-wrap > div:first-child, .detail-info { display: contents; }

      /* Orden mobile-first: imagen (hero) → identidad → precio → datos → descripción */
      #gallery-main        { order: 1; }
      .gallery-thumbs-wrap { order: 2; }
      .detail-head         { order: 3; }
      .detail-price        { order: 4; }
      #specs-grid          { order: 5; }
      #detail-desc         { order: 6; margin-top: 0; }
      #detail-cta          { order: 7; }

      /* Galería full-bleed real: ocupa todo el ancho del dispositivo */
      #gallery-main { width: 100vw; margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); border-radius: 0; aspect-ratio: 4/3; }
      .gallery-thumbs-wrap { margin-top: 8px; }
      .gallery-thumbs { scrollbar-width: none; }
      .gallery-thumbs::-webkit-scrollbar { display: none; }

      /* Identidad */
      .detail-head { margin-top: .1rem; }
      #detail-title { font-size: 1.7rem; }

      /* Precio prominente */
      .detail-price { padding: .9rem 1.1rem; }
      .detail-price-val { font-size: 2rem; }

      /* Datos: lista limpia con divisores dentro de un panel (sin cajitas), ancho completo */
      .specs-grid {
        grid-template-columns: 1fr; gap: 0;
        background: rgba(20,42,68,.35); border: 1px solid var(--border);
        border-radius: 14px; padding: 0 1.05rem;
      }
      .spec-card {
        background: transparent; border: none; border-radius: 0;
        border-bottom: 1px solid rgba(255,255,255,.07);
        padding: .85rem 0; gap: .8rem; align-items: center;
      }
      .spec-card:last-child { border-bottom: none; }
      .spec-card svg { width: 16px; height: 16px; margin-top: 0; }
      .spec-card > div { flex: 1; display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
      .spec-label { font-size: 12px; color: rgba(255,255,255,.45); text-transform: none; letter-spacing: 0; margin: 0; }
      .spec-value { font-size: 14px; font-weight: 600; color: var(--white); margin: 0; text-align: right; }

      /* Descripción: más aire, menos caja */
      #detail-desc { background: transparent; border: none; border-top: 1px solid var(--border); border-radius: 0; padding: 1.15rem .1rem 0; }

      /* Barra de acción fija abajo (app-like): precio + CTA siempre visibles */
      .with-mobile-bar #detail-cta { display: none; }
      .with-mobile-bar { padding-bottom: 88px; }
      .with-mobile-bar #detail-mobile-bar {
        display: flex; align-items: center; gap: .85rem;
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 120;
        padding: .7rem .9rem calc(.7rem + env(safe-area-inset-bottom, 0px));
        background: rgba(9,13,20,.92); backdrop-filter: blur(12px);
        border-top: 1px solid rgba(95,194,218,.2);
      }
      #detail-mobile-bar .mb-price { display: flex; flex-direction: column; line-height: 1.15; flex-shrink: 0; }
      #detail-mobile-bar .mb-price-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.4); }
      #detail-mobile-bar .mb-price-val { font-family: var(--font-data); font-variant-numeric: tabular-nums; font-weight: 600; font-size: 1.1rem; color: #fff; }
      #detail-mobile-bar .cta-quote { flex: 1; width: auto; padding: .8rem 1rem; font-size: 14px; }

      .wa-fab { display: none !important; }
    }
  </style>
</head>
<body>
<div id="navbar-container"></div>
<div id="toast"></div>

<main style="padding-top:64px;min-height:100vh;background:var(--bg-dark)">
  <div class="detail-topbar">
    <button onclick="history.back()" style="display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.4);font-size:13px;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.4)'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver al inventario
    </button>
  </div>

  <div id="detail-content" style="display:none">
    <div class="detail-wrap">
      <!-- Gallery -->
      <div>
        <div class="gallery-main" id="gallery-main">
          <div class="spinner" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
        </div>
        <div class="gallery-thumbs-wrap">
          <div class="gallery-thumbs" id="gallery-thumbs"></div>
        </div>
        <!-- Descripción · bajo las fotos -->
        <div id="detail-desc" style="display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.5rem 1.75rem;margin-top:1.25rem">
          <p style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-bottom:.5rem">Descripción</p>
          <p id="detail-desc-text" style="font-size:14px;color:rgba(255,255,255,.65);line-height:1.7"></p>
        </div>
      </div>
      <!-- Info -->
      <div class="detail-info">
        <div class="detail-head">
          <div id="detail-badges" style="display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap"></div>
          <h1 id="detail-title" style="font-family:var(--font-title);font-weight:900;font-size:2rem;color:var(--white);line-height:1.1"></h1>
          <p id="detail-year"   style="color:var(--text-muted);font-size:14px;margin-top:.25rem"></p>
        </div>
        <div class="detail-price">
          <div class="detail-price-label">Precio</div>
          <div class="detail-price-val" id="detail-price"></div>
        </div>
        <div class="specs-grid" id="specs-grid"></div>
        <div id="detail-cta"></div>
      </div>
    </div>
    <div id="detail-mobile-bar"></div>
  </div>

  <div id="detail-loading" style="padding:6rem 0;text-align:center"><div class="spinner"></div></div>
  <div id="detail-error" style="display:none;padding:6rem 1.5rem;text-align:center">
    <p style="font-family:var(--font-title);font-weight:700;font-size:1.25rem;color:var(--white);margin-bottom:1rem">Vehículo no encontrado</p>
    <a href="./index.html" style="color:var(--blue);font-size:14px">← Volver al inventario</a>
  </div>
</main>

<div id="footer-container"></div>

<script src="../assets/js/config.js?v=20260714000510"></script>
<script>
  document.getElementById('navbar-container').innerHTML = RAB.renderNavbar('Inventario')
  document.getElementById('footer-container').innerHTML = RAB.renderFooter()
  RAB.initNavbarScroll()

  const id = new URLSearchParams(location.search).get('id')
  let images = [], activeImg = 0

  function preload(url) { if (url) { const im = new Image(); im.src = url } }

  // Miniaturas: fade en los extremos cuando la tira se desborda (móvil y PC)
  function updateThumbFade() {
    const strip = document.getElementById('gallery-thumbs')
    if (!strip) return
    const max = strip.scrollWidth - strip.clientWidth
    strip.classList.toggle('fade-left',  max > 4 && strip.scrollLeft > 4)
    strip.classList.toggle('fade-right', max > 4 && strip.scrollLeft < max - 4)
  }
  window.addEventListener('resize', updateThumbFade)

  function showImg(i) {
    activeImg = i
    const main = document.getElementById('gallery-main')
    const img  = images[i]
    const srcset = RAB.imgSrcset(img)
    main.innerHTML = `
      <div class="gallery-loader"><div class="spinner"></div></div>
      <img class="gallery-photo" src="${RAB.imgUrl(img, 'medium')}"${srcset ? ` srcset="${srcset}" sizes="(max-width:768px) 100vw, 560px"` : ''} alt="" decoding="async" fetchpriority="high" onload="this.classList.add('loaded');const l=this.parentNode.querySelector('.gallery-loader');if(l)l.remove()" onerror="const l=this.parentNode.querySelector('.gallery-loader');if(l)l.remove()">
      ${images.length > 1 ? `
        <button class="gallery-nav prev" onclick="showImg(${(i - 1 + images.length) % images.length})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="gallery-nav next" onclick="showImg(${(i + 1) % images.length})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <span class="gallery-counter">${i + 1} / ${images.length}</span>` : ''}
    `
    document.querySelectorAll('.gallery-thumb').forEach((t, ti) => t.classList.toggle('active', ti === i))
    // Precarga la imagen vecina (medium) para que la navegación sea fluida
    if (images.length > 1) {
      preload(RAB.imgUrl(images[(i + 1) % images.length], 'medium'))
      preload(RAB.imgUrl(images[(i - 1 + images.length) % images.length], 'medium'))
    }
  }

  async function load() {
    if (!id) { showError(); return }
    try {
      const { data: v } = await RAB.api('/api/vehicles/' + id)
      document.title = `${v.brand} ${v.model} ${v.year} | RAB`

      images = (v.vehicle_images || []).sort((a, b) => (b.is_cover ? 1 : 0) - (a.is_cover ? 1 : 0))

      // Gallery
      const main   = document.getElementById('gallery-main')
      const thumbs = document.getElementById('gallery-thumbs')
      if (images.length) {
        showImg(0)
        if (images.length > 1) {
          thumbs.innerHTML = images.map((img, i) =>
            `<div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="showImg(${i})"><img src="${RAB.imgUrl(img, 'thumb')}" alt="" loading="lazy" decoding="async"></div>`
          ).join('')
          thumbs.addEventListener('scroll', updateThumbFade, { passive: true })
          requestAnimationFrame(updateThumbFade)
        }
      } else {
        main.innerHTML = `<div class="card-img-placeholder">${RAB.carSVG()}<span style="font-size:13px">Sin imágenes</span></div>`
      }

      // Badges
      const STATUS_BADGE = { 'Disponible': 'available', 'Vendido': 'sold', 'Próximo Ingreso': 'upcoming' }
      document.getElementById('detail-badges').innerHTML = `
        <span class="card-badge badge-${STATUS_BADGE[v.status] || 'available'}" style="position:static">${v.status}</span>
        ${v.featured ? '<span class="badge-featured" style="position:static"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 7.1-1.01L12 2z"/></svg>Destacado</span>' : ''}
      `

      document.getElementById('detail-title').textContent = `${v.brand} ${v.model}`
      document.getElementById('detail-year').textContent  = v.year
      document.getElementById('detail-price').textContent = RAB.price(v.price)

      // Specs
      const specs = [
        { icon: '<path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>', label: 'Año', value: v.year },
        { icon: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>', label: 'Kilometraje', value: Number(v.mileage).toLocaleString('es-CL') + ' km' },
        { icon: '<circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4"/>', label: 'Transmisión', value: v.transmission },
        { icon: '<path d="M3 3l3 9 3-3 3 3 3-9"/><path d="M6 12v9"/>', label: 'Combustible', value: v.fuel },
        { icon: '<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>', label: 'Categoría', value: v.category },
      ]
      document.getElementById('specs-grid').innerHTML = specs.map(s => `
        <div class="spec-card">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${s.icon}</svg>
          <div><div class="spec-label">${s.label}</div><div class="spec-value">${s.value}</div></div>
        </div>`).join('')

      // Description
      if (v.description) {
        document.getElementById('detail-desc').style.display = 'block'
        document.getElementById('detail-desc-text').textContent = v.description
      }

      // CTA
      const waMsg  = `Hola, me interesa cotizar el ${v.brand} ${v.model} ${v.year} — ${RAB.price(v.price)}. ¿Tienen disponibilidad?`
      const waUrl  = RAB.whatsappUrl(waMsg)
      const waIcon = RAB.waSVG(18)
      if (v.status === 'Disponible') {
        document.getElementById('detail-cta').innerHTML =
          `<a href="${waUrl}" target="_blank" class="cta-quote">${waIcon} Cotizar este auto</a>`
        // Barra de acción fija en móvil: precio + CTA siempre visibles
        document.getElementById('detail-mobile-bar').innerHTML =
          `<div class="mb-price"><span class="mb-price-label">Precio</span><span class="mb-price-val">${RAB.price(v.price)}</span></div>
           <a href="${waUrl}" target="_blank" class="cta-quote">${waIcon} Cotizar este auto</a>`
        document.getElementById('detail-content').classList.add('with-mobile-bar')
      } else {
        document.getElementById('detail-cta').innerHTML =
          `<div style="text-align:center;padding:1rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px">
             <p style="color:var(--text-muted);font-size:13px">Este vehículo no está disponible</p>
             <a href="./index.html" style="color:var(--blue);font-size:13px;display:inline-block;margin-top:.5rem">Ver otros vehículos →</a>
           </div>`
      }

      document.getElementById('detail-loading').style.display = 'none'
      document.getElementById('detail-content').style.display = 'block'

    } catch (e) { showError() }
  }

  function showError() {
    document.getElementById('detail-loading').style.display = 'none'
    document.getElementById('detail-error').style.display   = 'block'
  }

  load()
</script>
</body>
</html>
